api:
  dashboard: false

entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false

certificatesResolvers:
  letsencrypt:
    acme:
      email: "seuemail@dominio.com"
      storage: /letsencrypt/acme.json

      dnsChallenge:
        provider: cloudflare

        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

